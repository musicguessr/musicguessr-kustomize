apiVersion: apps/v1
kind: Deployment
metadata:
  name: musicguessr-backend
  namespace: musicguessr
  labels:
    app: musicguessr-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: musicguessr-backend
  template:
    metadata:
      labels:
        app: musicguessr-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/musicguessr/musicguessr-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: musicguessr-backend-config
          # Sensitive values from Secret
          env:
            - name: DISCOGS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: musicguessr-secrets
                  key: DISCOGS_TOKEN
                  optional: true
            - name: DECK_STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: musicguessr-secrets
                  key: DECK_STORAGE_ACCESS_KEY_ID
                  optional: true
            - name: DECK_STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: musicguessr-secrets
                  key: DECK_STORAGE_SECRET_ACCESS_KEY
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
