apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: musicguessr
resources:
  - namespace.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml

images:
  - name: ghcr.io/musicguessr/musicguessr-backend
    newTag: latest
  - name: ghcr.io/musicguessr/musicguessr-frontend
    newTag: latest

configMapGenerator:
  - name: musicguessr-backend-config
    literals:
      - PORT=8080
      - LOG_LEVEL=info
      - INVIDIOUS_INSTANCES=https://iv.melmac.space,https://invidious.darkness.services
      - METADATA_CACHE_TTL_SECONDS=86400
      - THEAUDIODB_KEY=1
      # Deck storage — set DECK_STORAGE_PROVIDER=s3 and fill S3 vars for production
      - DECK_STORAGE_PROVIDER=s3
      - DECK_STORAGE_PATH=./data/decks
      - DECK_STORAGE_ENDPOINT=https://s3.waw.io.cloud.ovh.net/
      - DECK_STORAGE_BUCKET=tan-nakamura
      - DECK_STORAGE_REGION=waw
      # Public base URL of the frontend — used to build share_url in POST /api/deck response
      - FRONTEND_URL=https://musicguessr.app

  - name: musicguessr-frontend-config
    literals:
      # Backend API URL as seen from the user's browser (not the internal cluster URL)
      - API_URL=https://musicguessr.app
      # Public URL of the frontend — used for canonical tags, OG meta, sitemap
      - SITE_URL=https://musicguessr.app
      # Spotify OAuth — client ID is public, not a secret
      - SPOTIFY_CLIENT_ID=
      # Search engine verification tokens (appear in HTML source, not sensitive)
      - GOOGLE_SITE_VERIFICATION=RgjPqYdHKBZRkcLJmwqz_6_lapNFDwN95KPg_nU-bgw
      - BING_SITE_VERIFICATION=B9D94C6EB071A782D3737FDF1AF6C4AE
      # Google Analytics 4 Measurement ID (e.g. G-XXXXXXXXXX) — leave empty to disable
      - GA_MEASUREMENT_ID=G-XVVFTEXDG0

secretGenerator:
  - name: musicguessr-secrets
    envs:
      - secrets.env
