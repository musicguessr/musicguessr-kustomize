apiVersion: apps/v1
kind: Deployment
metadata:
  name: musicguessr-frontend
  namespace: musicguessr
  labels:
    app: musicguessr-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: musicguessr-frontend
  template:
    metadata:
      labels:
        app: musicguessr-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/musicguessr/musicguessr-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          # Non-sensitive config from ConfigMap (API_URL, SITE_URL, SPOTIFY_CLIENT_ID,
          # GOOGLE_SITE_VERIFICATION, BING_SITE_VERIFICATION, GA_MEASUREMENT_ID — all injected by entrypoint.sh)
          envFrom:
            - configMapRef:
                name: musicguessr-frontend-config
          # Sensitive values from Secret
          env:
            - name: APPLE_DEV_TOKEN
              valueFrom:
                secretKeyRef:
                  name: musicguessr-secrets
                  key: APPLE_DEV_TOKEN
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
